networks:
  microservice-network:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  grafana-data:

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: ordem_db,pagamento_db,catalogo_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: admin_rbac
    volumes:
      - mongodb-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - microservice-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - microservice-network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - microservice-network

  traefik:
    image: traefik:v3.0
    container_name: traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./api-gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./api-gateway/dynamic:/etc/traefik/dynamic:ro
    networks:
      - microservice-network

  # ── Application Services ─────────────────────────────────────────────────────

  frontend-angular:
    build:
      context: ./frontend-angular
      dockerfile: Dockerfile
    container_name: frontend-angular
    networks:
      - microservice-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      - traefik

  bff-service:
    build:
      context: ./bff-service
      dockerfile: Dockerfile
    container_name: bff-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-https://login.microsoftonline.com/common/v2.0}
      OAUTH2_CLIENT_ID: ${OAUTH2_CLIENT_ID:-change-me}
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET:-change-me}
      OAUTH2_CLIENT_SCOPE: ${OAUTH2_CLIENT_SCOPE:-api://YOUR_API_CLIENT_ID/access_as_user}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-env}
      CATALOGO_SERVICE_URL: ${CATALOGO_SERVICE_URL:-http://catalogo-servico:8083/api}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    networks:
      - microservice-network
    depends_on:
      redis:
        condition: service_healthy
      traefik:
        condition: service_started

  ordem-servico:
    build:
      context: ./ordem-servico
      dockerfile: Dockerfile
    container_name: ordem-servico
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ordem_db
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-https://login.microsoftonline.com/common/v2.0}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-env}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    networks:
      - microservice-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  pagamento-servico:
    build:
      context: ./pagamento-servico
      dockerfile: Dockerfile
    container_name: pagamento-servico
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pagamento_db
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-https://login.microsoftonline.com/common/v2.0}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-env}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    networks:
      - microservice-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  catalogo-servico:
    build:
      context: ./catalogo-servico
      dockerfile: Dockerfile
    container_name: catalogo-servico
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: catalogo_db
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-https://login.microsoftonline.com/common/v2.0}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-env}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    networks:
      - microservice-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-rbac:
    build:
      context: ./admin-rbac
      dockerfile: Dockerfile
    container_name: admin-rbac
    environment:
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/admin_rbac?authSource=admin
      MONGODB_DATABASE: admin_rbac
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    networks:
      - microservice-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.services.admin.loadbalancer.server.port=8084"
    depends_on:
      mongodb:
        condition: service_healthy
