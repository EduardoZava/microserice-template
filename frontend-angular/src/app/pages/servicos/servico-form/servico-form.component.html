<div class="page-header">
  <h2>{{ editando ? 'Editar Serviço' : 'Novo Serviço' }}</h2>
</div>

<div class="alert alert-error" *ngIf="erro">{{ erro }}</div>
<div class="loading" *ngIf="loading">Carregando dados...</div>

<form [formGroup]="form" (ngSubmit)="salvar()" class="form-card" *ngIf="!loading">
  <div class="form-group">
    <label>Nome *</label>
    <input type="text" formControlName="nome" placeholder="Nome do serviço" />
    <span class="field-error" *ngIf="f['nome'].touched && f['nome'].errors?.['required']">Nome é obrigatório.</span>
    <span class="field-error" *ngIf="f['nome'].touched && f['nome'].errors?.['minlength']">Mínimo 2 caracteres.</span>
  </div>

  <div class="form-group">
    <label>Descrição</label>
    <textarea formControlName="descricao" rows="3" placeholder="Descrição do serviço"></textarea>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Preço Base (R$) *</label>
      <input type="number" step="0.01" min="0" formControlName="precoBase" placeholder="0,00" />
      <span class="field-error" *ngIf="f['precoBase'].touched && f['precoBase'].errors?.['required']">Preço base é obrigatório.</span>
      <span class="field-error" *ngIf="f['precoBase'].touched && f['precoBase'].errors?.['min']">Preço deve ser maior que zero.</span>
    </div>

    <div class="form-group">
      <label>Duração Estimada (min) *</label>
      <input type="number" min="1" formControlName="duracaoEstimadaMinutos" placeholder="60" />
      <span class="field-error" *ngIf="f['duracaoEstimadaMinutos'].touched && f['duracaoEstimadaMinutos'].errors?.['required']">Duração é obrigatória.</span>
      <span class="field-error" *ngIf="f['duracaoEstimadaMinutos'].touched && f['duracaoEstimadaMinutos'].errors?.['min']">Deve ser maior que zero.</span>
    </div>
  </div>

  <div class="form-group">
    <label>Categoria</label>
    <input type="text" formControlName="categoria" placeholder="Ex: Consultoria, Manutenção..." />
  </div>

  <div class="form-group form-check">
    <label>
      <input type="checkbox" formControlName="ativo" />
      Serviço ativo
    </label>
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    <button type="submit" class="btn btn-primary" [disabled]="salvando">
      {{ salvando ? 'Salvando...' : 'Salvar' }}
    </button>
  </div>
</form>
