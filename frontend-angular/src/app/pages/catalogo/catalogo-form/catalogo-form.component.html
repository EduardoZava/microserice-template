<div class="page-header">
  <h2>{{ editando ? 'Editar Produto' : 'Novo Produto' }}</h2>
</div>

<div class="alert alert-error" *ngIf="erro">{{ erro }}</div>
<div class="loading" *ngIf="loading">Carregando dados...</div>

<form [formGroup]="form" (ngSubmit)="salvar()" class="form-card" *ngIf="!loading">

  <div class="form-group">
    <label>Nome *</label>
    <input type="text" formControlName="nome" placeholder="Nome do produto" />
    <span class="field-error" *ngIf="f['nome'].touched && f['nome'].errors?.['required']">Nome é obrigatório.</span>
    <span class="field-error" *ngIf="f['nome'].touched && f['nome'].errors?.['minlength']">Mínimo 2 caracteres.</span>
  </div>

  <div class="form-group">
    <label>Descrição</label>
    <textarea formControlName="descricao" rows="3" placeholder="Descrição do produto"></textarea>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Preço (R$) *</label>
      <input type="number" step="0.01" min="0" formControlName="preco" placeholder="0,00" />
      <span class="field-error" *ngIf="f['preco'].touched && f['preco'].errors?.['required']">Preço é obrigatório.</span>
      <span class="field-error" *ngIf="f['preco'].touched && f['preco'].errors?.['min']">Preço deve ser maior que zero.</span>
    </div>

    <div class="form-group">
      <label>Estoque *</label>
      <input type="number" min="0" formControlName="estoque" placeholder="0" />
      <span class="field-error" *ngIf="f['estoque'].touched && f['estoque'].errors?.['required']">Estoque é obrigatório.</span>
    </div>
  </div>

  <div class="form-group">
    <label>Categoria</label>
    <input type="text" formControlName="categoria" placeholder="Ex: Eletrônicos, Roupas…" />
  </div>

  <div class="form-group form-check">
    <label>
      <input type="checkbox" formControlName="ativo" />
      Produto ativo
    </label>
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    <button type="submit" class="btn btn-primary" [disabled]="salvando">
      {{ salvando ? 'Salvando...' : 'Salvar' }}
    </button>
  </div>

</form>
