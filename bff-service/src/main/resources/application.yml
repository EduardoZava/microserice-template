spring:
  application:
    name: bff-service
  session:
    store-type: redis
  security:
    oauth2:
      client:
        provider:
          entra:
            issuer-uri: ${OAUTH2_ISSUER_URI:https://login.microsoftonline.com/YOUR_TENANT_ID/v2.0}
        registration:
          internal-api-client:
            provider: entra
            authorization-grant-type: client_credentials
            client-id: ${OAUTH2_CLIENT_ID:change-me}
            client-secret: ${OAUTH2_CLIENT_SECRET:change-me}
            scope: ${OAUTH2_CLIENT_SCOPE:api://YOUR_API_CLIENT_ID/access_as_user}
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://login.microsoftonline.com/YOUR_TENANT_ID/v2.0}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.template.bff: DEBUG

internal:
  api:
    key: ${INTERNAL_API_KEY:change-me-in-env}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

